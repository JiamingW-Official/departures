<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" href="data:,">
<title>DEPARTURES</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="board">
 <div id="hdr">
  <div id="hdr-left">
   <div id="hdr-top"><span id="live-dot"></span><div id="ap-iata"></div><span id="ap-name"></span></div>
   <div id="hdr-meta2"><span id="tz-label"></span><span id="date-info"></span></div>
  </div>
  <div id="hdr-right">
   <div id="clock"></div>
   <div id="pginfo"></div>
  </div>
 </div>
 <div id="flights">
  <div class="col" id="colL"></div>
  <div class="col-divider"></div>
  <div class="col" id="colR"></div>
 </div>
 <div id="nav"><div id="nav-fixed"></div><div id="nav-scroll"></div></div>
</div>
<div id="search">
 <div id="search-box">
  <div id="search-tabs">
   <button class="stab act" onclick="setSearchTab('ap')">AIRPORTS</button>
   <button class="stab" onclick="setSearchTab('fl')">FLIGHTS</button>
  </div>
  <input id="search-input" type="text" placeholder="AIRPORT CODE OR NAME..." autocomplete="off" spellcheck="false">
  <div id="search-filters"></div>
  <div id="search-results"></div>
  <div id="search-hint">&uarr;&darr; navigate &ensp; PgUp/Dn fast &ensp; Tab switch &ensp; Enter select &ensp; Esc close</div>
 </div>
</div>
<div id="help">
 <div id="help-box">
  <div id="help-title">KEYBOARD SHORTCUTS</div>
  <div id="help-grid">
   <div class="hk"><kbd>/ </kbd><span>Search</span></div>
   <div class="hk"><kbd>M</kbd><span>Sound</span></div>
   <div class="hk"><kbd>↑ ↓</kbd><span>Page</span></div>
   <div class="hk"><kbd>← →</kbd><span>Airport</span></div>
   <div class="hk"><kbd>N</kbd><span>Jump to now</span></div>
   <div class="hk"><kbd>F</kbd><span>Fullscreen</span></div>
   <div class="hk"><kbd>S</kbd><span>Favorite</span></div>
   <div class="hk"><kbd>?</kbd><span>This help</span></div>
   <div class="hk"><kbd>1-9</kbd><span>Go to page</span></div>
   <div class="hk"><kbd>Tab</kbd><span>Search tab</span></div>
   <div class="hk"><kbd>Esc</kbd><span>Close</span></div>
   <div class="hk"><kbd>Enter</kbd><span>Select</span></div>
  </div>
  <div id="help-hint">PRESS ANY KEY TO CLOSE</div>
 </div>
</div>
<script src="js/data.js"></script>
<script src="js/audio.js"></script>
<script src="js/engine.js"></script>
<script src="js/app.js"></script>
</body>
</html>
